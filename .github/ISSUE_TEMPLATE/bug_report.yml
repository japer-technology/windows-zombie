name: Bug report
description: Report a defect in the installer, payload, or chat service.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug.

        Before filing, please run `pwsh -File payload/bin/Collect-Diagnostics.ps1`
        (or `pwsh -File scripts/Install.ps1 doctor` on a failed install) and
        attach the redacted output. **Do not paste API keys, the Tailscale
        auth key, or the contents of `C:\ProgramData\AiZombie\secrets\`.**
  - type: input
    id: windows-version
    attributes:
      label: Windows version
      description: Output of `(Get-ComputerInfo).OsName` and `winver` (must be a supported Windows 10/11 edition).
      placeholder: "Windows 11 Pro 23H2 (22631.3447)"
    validations:
      required: true
  - type: dropdown
    id: install-path
    attributes:
      label: Install path
      description: Which invocation surfaced the bug?
      options:
        - "Fresh install (first `Install.ps1 install`)"
        - "Re-run install (idempotent path)"
        - "verify"
        - "doctor"
        - "repair"
        - "uninstall"
        - "Runtime (chat service, helpers, Windows Service)"
        - "Other / not sure"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Windows Zombie version
      description: Contents of the `VERSION` file or the version reported by `Install.ps1 verify`.
      placeholder: "0.4.0"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you expect, and what did you observe?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact commands and any environment variables that were set.
      render: powershell
    validations:
      required: true
  - type: textarea
    id: verify-output
    attributes:
      label: `verify` / `doctor` output
      description: Redacted output of `pwsh -File scripts/Install.ps1 verify` and/or `doctor`.
      render: text
  - type: textarea
    id: logs
    attributes:
      label: Relevant log excerpts
      description: |
        Redacted excerpts from `C:\ProgramData\AiZombie\logs\install.log`,
        `C:\ProgramData\AiZombie\logs\audit.log`, or the Application event log
        (`Get-WinEvent -LogName Application -ProviderName WindowsZombie-Chat -MaxEvents 50`).
      render: text
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have removed API keys, the Tailscale auth key, and any host-identifying secrets from the report.
          required: true
        - label: I have searched existing issues for duplicates.
          required: true
