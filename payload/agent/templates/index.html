<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Windows Zombie — {{HOSTNAME}}</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, sans-serif; margin: 0; padding: 0;
         display: flex; flex-direction: column; height: 100vh; }
  header { padding: .6rem 1rem; border-bottom: 1px solid #8884;
           display: flex; justify-content: space-between; align-items: baseline; }
  header h1 { font-size: 1rem; margin: 0; }
  header .status { font-size: .8rem; opacity: .8; }
  main { flex: 1; overflow-y: auto; padding: 1rem; max-width: 60rem;
         width: 100%; margin: 0 auto; box-sizing: border-box; }
  .msg { margin: .8rem 0; padding: .6rem .8rem; border-radius: .5rem;
         white-space: pre-wrap; word-wrap: break-word; }
  .user { background: #4a90e220; border: 1px solid #4a90e266; }
  .assistant { background: #8884; }
  .system { background: #f5a62320; border: 1px solid #f5a62366;
            font-family: ui-monospace, monospace; font-size: .85rem; }
  .system.error { background: #e74c3c30; border-color: #e74c3c; }
  .role { font-size: .7rem; text-transform: uppercase; opacity: .6;
          margin-bottom: .2rem; }
  .proposal { border: 1px solid #f5a623; border-radius: .5rem;
              padding: .6rem .8rem; margin: .5rem 0;
              background: #f5a62315; }
  .proposal code { display: block; padding: .4rem .6rem;
                   background: #0002; border-radius: .3rem;
                   font-family: ui-monospace, monospace; font-size: .85rem;
                   white-space: pre-wrap; word-wrap: break-word; }
  .proposal .class { font-size: .75rem; text-transform: uppercase;
                     letter-spacing: .05em; opacity: .8; }
  .proposal.read_only { border-color: #2ecc71; background: #2ecc7115; }
  .proposal.destructive { border-color: #e74c3c; background: #e74c3c15; }
  .proposal .actions { margin-top: .5rem; display: flex; gap: .5rem;
                       align-items: center; flex-wrap: wrap; }
  button { padding: .35rem .8rem; border-radius: .3rem;
           border: 1px solid #8888; background: #fff2; cursor: pointer; }
  button.primary { background: #2ecc7140; border-color: #2ecc71; }
  button.danger { background: #e74c3c40; border-color: #e74c3c; }
  input[type=text] { padding: .35rem .5rem; border-radius: .3rem;
                     border: 1px solid #8888; background: #fff2;
                     min-width: 18rem; }
  footer { padding: .8rem 1rem; border-top: 1px solid #8884; }
  form { display: flex; gap: .5rem; max-width: 60rem; margin: 0 auto; }
  textarea { flex: 1; min-height: 3rem; padding: .5rem;
             border-radius: .3rem; border: 1px solid #8888;
             font: inherit; resize: vertical; background: #fff2; }
  .examples { font-size: .8rem; opacity: .75;
              max-width: 60rem; margin: 0 auto; padding: .3rem 1rem 0; }
  .examples summary { cursor: pointer; }
  .result { margin-top: .5rem; }
  .result pre { background: #0003; padding: .4rem .6rem;
                border-radius: .3rem; max-height: 16rem; overflow: auto;
                font-size: .8rem; }
  .turn-status { max-width: 60rem; margin: .3rem auto 0; padding: 0 1rem;
                 font-size: .8rem; opacity: .75; min-height: 1.1rem; }
  .thinking { display: flex; align-items: center; gap: .5rem; }
  .thinking .dots { display: inline-flex; gap: .25rem; }
  .thinking .dots i { width: .4rem; height: .4rem; border-radius: 50%;
                      background: currentColor; opacity: .35;
                      animation: zblink 1.2s infinite ease-in-out both; }
  .thinking .dots i:nth-child(2) { animation-delay: .2s; }
  .thinking .dots i:nth-child(3) { animation-delay: .4s; }
  @keyframes zblink { 0%, 80%, 100% { opacity: .25; }
                      40% { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) {
    .thinking .dots i { animation: none; opacity: .6; }
  }
</style>
</head>
<body>
<header>
  <h1>Windows Zombie · {{HOSTNAME}} · {{OS}}</h1>
  <div class="status">Provider: {{PROVIDER_STATUS}}</div>
</header>
<main id="log" aria-live="polite"></main>
<details class="examples">
  <summary>Safe example prompts</summary>
  <pre>{{EXAMPLES}}</pre>
</details>
<footer>
  <form id="form">
    <textarea id="prompt" placeholder="Ask the administrator…  (Enter to send, Shift+Enter for newline, /help for commands)" required></textarea>
    <button type="submit" id="send" class="primary">Send</button>
    <button type="button" id="stop" class="danger" hidden>Stop</button>
  </form>
  <div id="status" class="turn-status" role="status" aria-live="polite"></div>
</footer>
<script>
"use strict";
let conversationId = null;
const log = document.getElementById("log");
const form = document.getElementById("form");
const promptEl = document.getElementById("prompt");
const sendBtn = document.getElementById("send");
const stopBtn = document.getElementById("stop");
const statusEl = document.getElementById("status");

// In-flight turn state. ``turnController`` lets the operator (or a
// client-side timeout) abort a request that the server is taking too
// long to answer, so the UI can never wedge on a single prompt. The
// default ceiling is generous — longer than the server-side idle
// deadline — so a legitimately slow turn still completes server-side
// before the browser gives up.
let turnController = null;
let thinkingEl = null;
let thinkingTimer = null;
const CLIENT_TURN_TIMEOUT_MS = 180000;

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") e.className = v;
    else if (k === "text") e.textContent = v;
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return e;
}

function addMessage(role, content, opts = {}) {
  const cls = opts.error ? `msg ${role} error` : `msg ${role}`;
  const wrap = el("div", { class: cls });
  wrap.appendChild(el("div", { class: "role", text: role }));
  wrap.appendChild(el("div", { text: content }));
  log.appendChild(wrap);
  log.scrollTop = log.scrollHeight;
  return wrap;
}

function showThinking() {
  const wrap = el("div", { class: "msg assistant thinking" });
  wrap.appendChild(el("div", { class: "role", text: "assistant" }));
  const dots = el("div", { class: "dots" }, el("i", {}), el("i", {}), el("i", {}));
  const label = el("span", { text: "Thinking… 0s" });
  wrap.appendChild(dots);
  wrap.appendChild(label);
  log.appendChild(wrap);
  log.scrollTop = log.scrollHeight;
  const started = Date.now();
  thinkingTimer = setInterval(() => {
    const secs = Math.round((Date.now() - started) / 1000);
    label.textContent = `Thinking… ${secs}s`;
  }, 1000);
  return wrap;
}

function clearThinking() {
  if (thinkingTimer !== null) { clearInterval(thinkingTimer); thinkingTimer = null; }
  if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
}

function setBusy(busy) {
  // Keep the textarea enabled so slash commands (/help, /clear, /stop)
  // remain usable, but reflect the turn state on the controls.
  sendBtn.disabled = busy;
  stopBtn.hidden = !busy;
  log.setAttribute("aria-busy", busy ? "true" : "false");
  statusEl.textContent = busy ? "Agent is working…" : "";
}

function abortTurn(reason) {
  if (turnController) {
    try { turnController.abort(); } catch (_e) { /* ignore */ }
  }
  if (reason) statusEl.textContent = reason;
}

stopBtn.addEventListener("click", () => abortTurn("Stopped."));

function renderResult(result) {
  const wrap = el("div", { class: "result" });
  if (result && typeof result.exit_code !== "undefined") {
    wrap.appendChild(el("div", {
      text: `exit ${result.exit_code}` +
            (typeof result.duration_ms === "number" ? ` · ${result.duration_ms} ms` : "")
    }));
  }
  if (result && result.stdout) wrap.appendChild(el("pre", { text: result.stdout }));
  if (result && result.stderr) {
    const pre = el("pre", { text: result.stderr });
    pre.style.color = "#e74c3c";
    wrap.appendChild(pre);
  }
  if (result && result.content && !result.stdout) {
    wrap.appendChild(el("pre", { text: result.content }));
  }
  if (result && result.follow_up && result.follow_up.length) {
    const f = el("div", {});
    f.appendChild(el("div", { text: "Suggested follow-ups:" }));
    for (const cmd of result.follow_up) f.appendChild(el("code", { text: cmd }));
    wrap.appendChild(f);
  }
  return wrap;
}

// pi-mono emits structured tool events instead of fenced bash.
// Three bubble types replace the old renderProposal:
//
//   tool_call          — every tool dispatch (auto or queued)
//   tool_observation   — the recorded result (or denial)
//   pending_tool_call  — operator gate for elevated calls
//
// A per-turn counter (see renderTurnCounter below) reminds the
// operator that the agent is bounded by ``policy.yaml`` budgets.
function summarizeArgs(args) {
  if (!args || typeof args !== "object") return "";
  try { return JSON.stringify(args); }
  catch (_e) { return String(args); }
}

function renderToolCall(p) {
  const wrap = el("div", { class: `proposal ${p.classification || "tool"}` });
  wrap.appendChild(el("div", { class: "class",
    text: `${p.tool} · ${p.classification || "?"} · ${p.decision || "?"}` }));
  wrap.appendChild(el("code", { text: summarizeArgs(p.args) }));
  if (p.error) wrap.appendChild(el("div", { class: "system error", text: p.error }));
  return wrap;
}

function renderToolObservation(p) {
  const wrap = el("div", { class: "result" });
  const header = `observation · ${p.tool}` +
                 (p.decision ? ` · ${p.decision}` : "");
  wrap.appendChild(el("div", { class: "role", text: header }));
  if (p.ok === false) {
    wrap.appendChild(el("div", { class: "system error",
      text: p.error || "tool failed" }));
  } else {
    wrap.appendChild(renderResult(p.result || {}));
  }
  return wrap;
}

function renderPendingToolCall(p) {
  const wrap = el("div", { class: `proposal ${p.classification || "tool"}` });
  wrap.appendChild(el("div", { class: "class",
    text: `${p.tool} · ${p.classification} · awaiting approval` }));
  const actions = el("div", { class: "actions" });
  let phraseInput = null;
  if (p.requires_phrase) {
    phraseInput = el("input", { type: "text",
      placeholder: `type: ${p.confirm_phrase}` });
    actions.appendChild(phraseInput);
  }
  const approve = el("button", { class: "primary", text: "Approve" });
  const deny = el("button", { class: "danger", text: "Deny" });
  approve.addEventListener("click", async () => {
    approve.disabled = deny.disabled = true;
    const body = { tool_call_id: p.tool_call_id, decision: "approve" };
    if (phraseInput) body.phrase = phraseInput.value;
    const r = await fetch("/api/approve", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const data = await r.json();
    actions.remove();
    if (data.error) wrap.appendChild(el("div", { class: "system error", text: data.error }));
    else if (data.result) wrap.appendChild(renderResult(data.result));
    else wrap.appendChild(el("div", { text: `(${data.status})` }));
  });
  deny.addEventListener("click", async () => {
    approve.disabled = deny.disabled = true;
    await fetch("/api/approve", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ tool_call_id: p.tool_call_id, decision: "deny" }),
    });
    actions.remove();
    wrap.appendChild(el("div", { text: "Denied." }));
  });
  actions.appendChild(approve);
  actions.appendChild(deny);
  wrap.appendChild(actions);
  return wrap;
}

function renderTurnCounter(events) {
  const total = events.length;
  const elevated = events.filter(e =>
    e.kind === "tool_call" &&
    e.payload && e.payload.classification && e.payload.classification !== "read_only"
  ).length;
  const wrap = el("div", { class: "system", text:
    `Turn budget: ${total} tool call${total === 1 ? "" : "s"}` +
    ` (${elevated} elevated)` });
  return wrap;
}

function renderSkillActive(p) {
  const wrap = el("div", { class: "system" });
  const name = p.name || "?";
  const path = p.path || "";
  wrap.appendChild(el("div", { class: "role", text: "skill loaded" }));
  wrap.appendChild(el("div", { text: `${name} — ${path}` }));
  return wrap;
}

function renderEvent(ev) {
  const p = ev.payload || {};
  if (ev.kind === "tool_call") return renderToolCall(p);
  if (ev.kind === "tool_observation") return renderToolObservation(p);
  if (ev.kind === "pending_tool_call") return renderPendingToolCall(p);
  if (ev.kind === "skill_active") return renderSkillActive(p);
  return null;
}

// Client-side slash commands. Most are handled entirely in the
// browser; the diagnostic commands fetch a read-only backend endpoint
// (the same data the chat-service CLI exposes) and render it locally
// without ever reaching the agent. ``handleSlashCommand`` resolves to
// true when the input was a recognised command (so the caller skips
// the network round-trip to the model) and false otherwise.
const SLASH_COMMANDS = [
  ["/help", "List the available chat commands."],
  ["/clear", "Clear the messages from this view."],
  ["/new", "Start a new conversation (alias: /reset)."],
  ["/examples", "Show the safe example prompts."],
  ["/tools", "List the agent tools and their risk classification."],
  ["/health", "Show this machine's facts (hostname, OS, kernel, arch)."],
  ["/status", "Show a compact host + provider status line."],
  ["/version", "Show the payload and provider-bridge versions."],
  ["/audit", "Show the most recent audit-log entries."],
  ["/conversations", "List recent conversations (alias: /history)."],
  ["/load", "Load a past conversation: /load <id>."],
  ["/shortcuts", "Show the keyboard shortcuts."],
  ["/stop", "Cancel the turn that is currently running."],
];

async function fetchJson(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`${path} → HTTP ${r.status}`);
  return r.json();
}

function timestamp(value) {
  if (typeof value === "number" && isFinite(value)) {
    return new Date(value * 1000).toLocaleString();
  }
  return value ? String(value) : "";
}

function renderConversation(messages, events) {
  // Replay a stored conversation faithfully: interleave chat messages
  // and tool events by their recorded timestamp so a loaded transcript
  // reads in the same order it happened live (rather than every message
  // first, then every tool call bunched at the end). ``seq`` is a single
  // counter spanning both arrays, so when two items share a timestamp
  // the tiebreak is their original insertion order (messages are added
  // before the tool events they trigger).
  const items = [];
  let seq = 0;
  for (const m of messages || []) {
    if (m.role === "user" || m.role === "assistant") {
      items.push({ at: m.created_at, seq: seq++, node: () => addMessage(m.role, m.content) });
    }
  }
  for (const ev of events || []) {
    items.push({ at: ev.created_at, seq: seq++, node: () => {
      const n = renderEvent(ev);
      if (n) log.appendChild(n);
    }});
  }
  items.sort((a, b) => {
    const at = (typeof a.at === "number") ? a.at : 0;
    const bt = (typeof b.at === "number") ? b.at : 0;
    return at === bt ? a.seq - b.seq : at - bt;
  });
  for (const item of items) item.node();
}

async function handleSlashCommand(input) {
  const parts = input.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const arg = parts.slice(1).join(" ").trim();
  if (!cmd.startsWith("/")) return false;
  switch (cmd) {
    case "/help": {
      addMessage("user", input);
      const lines = SLASH_COMMANDS.map(([c, d]) => `${c} — ${d}`);
      addMessage("system", "Available commands:\n" + lines.join("\n"));
      return true;
    }
    case "/clear": {
      log.replaceChildren();
      return true;
    }
    case "/new":
    case "/reset": {
      conversationId = null;
      log.replaceChildren();
      addMessage("system", "Started a new conversation.");
      return true;
    }
    case "/examples": {
      addMessage("user", input);
      const details = document.querySelector("details.examples");
      if (details) details.open = true;
      const pre = details ? details.querySelector("pre") : null;
      addMessage("system", pre && pre.textContent.trim()
        ? pre.textContent
        : "No example prompts are available.");
      return true;
    }
    case "/shortcuts": {
      addMessage("user", input);
      addMessage("system",
        "Keyboard shortcuts:\n" +
        "Enter — send the current message\n" +
        "Shift+Enter (or Ctrl/Cmd+Enter) — insert a newline\n" +
        "/stop — cancel the in-flight turn");
      return true;
    }
    case "/stop": {
      addMessage("user", input);
      if (turnController) {
        abortTurn("Stopped.");
        addMessage("system", "Cancelling the current turn…");
      } else {
        addMessage("system", "Nothing is running.");
      }
      return true;
    }
    case "/tools": {
      addMessage("user", input);
      try {
        const data = await fetchJson("/api/tools");
        const tools = data.tools || [];
        if (!tools.length) { addMessage("system", "No tools are registered."); return true; }
        const lines = tools.map(t =>
          `${t.name} · ${t.classification}` +
          (t.description ? ` — ${t.description}` : ""));
        addMessage("system", "Agent tools:\n" + lines.join("\n"));
      } catch (err) {
        addMessage("system", String(err), { error: true });
      }
      return true;
    }
    case "/health": {
      addMessage("user", input);
      try {
        const data = await fetchJson("/api/health");
        const facts = data.facts || {};
        const lines = Object.entries(facts).map(([k, v]) => `${k}: ${v}`);
        addMessage("system", lines.length
          ? "Machine facts:\n" + lines.join("\n")
          : "No machine facts are available.");
      } catch (err) {
        addMessage("system", String(err), { error: true });
      }
      return true;
    }
    case "/status": {
      addMessage("user", input);
      try {
        const data = await fetchJson("/api/health");
        const f = data.facts || {};
        const provider = document.querySelector("header .status");
        const providerText = provider ? provider.textContent : "";
        addMessage("system",
          `${f.hostname || "?"} · ${f.os || "Windows"} · ${f.kernel || "?"} ` +
          `(${f.arch || "?"})` + (providerText ? ` · ${providerText}` : ""));
      } catch (err) {
        addMessage("system", String(err), { error: true });
      }
      return true;
    }
    case "/version": {
      addMessage("user", input);
      try {
        const data = await fetchJson("/api/version");
        const lines = [`payload: ${data.version || "unknown"}`];
        if (data.pi_mono) lines.push(`pi-mono: ${data.pi_mono}`);
        if (data.pi_ai) lines.push(`pi-ai: ${data.pi_ai}`);
        addMessage("system", lines.join("\n"));
      } catch (err) {
        addMessage("system", String(err), { error: true });
      }
      return true;
    }
    case "/audit": {
      addMessage("user", input);
      try {
        const data = await fetchJson("/api/audit");
        const entries = data.entries || [];
        if (!entries.length) { addMessage("system", "The audit log is empty."); return true; }
        const lines = entries.slice(-25).map(e => {
          const head = `${e.ts || ""} ${e.type || "?"}`.trim();
          const detail = [e.tool, e.decision, e.classification,
            (typeof e.exit_code !== "undefined" ? `exit ${e.exit_code}` : null)]
            .filter(Boolean).join(" · ");
          return detail ? `${head} — ${detail}` : head;
        });
        addMessage("system", "Recent audit entries:\n" + lines.join("\n"));
      } catch (err) {
        addMessage("system", String(err), { error: true });
      }
      return true;
    }
    case "/conversations":
    case "/history": {
      addMessage("user", input);
      try {
        const data = await fetchJson("/api/conversations");
        const convs = data.conversations || [];
        if (!convs.length) { addMessage("system", "No conversations yet."); return true; }
        const lines = convs.map(c =>
          `#${c.id} · ${timestamp(c.created_at)} · ${c.title || "(untitled)"}`);
        addMessage("system",
          "Recent conversations (use /load <id>):\n" + lines.join("\n"));
      } catch (err) {
        addMessage("system", String(err), { error: true });
      }
      return true;
    }
    case "/load": {
      addMessage("user", input);
      const id = parseInt(arg, 10);
      if (!arg || isNaN(id)) {
        addMessage("system", "Usage: /load <id>", { error: true });
        return true;
      }
      try {
        // Read the JSON body regardless of HTTP status so a
        // server-provided message (bad id / no such conversation)
        // surfaces instead of a bare "HTTP 404".
        const r = await fetch(`/api/conversation/${id}`);
        const data = await r.json().catch(() => ({}));
        if (!r.ok || data.error) {
          addMessage("system", data.error || `/api/conversation/${id} → HTTP ${r.status}`,
            { error: true });
          return true;
        }
        log.replaceChildren();
        conversationId = id;
        addMessage("system", `Loaded conversation #${id}.`);
        renderConversation(data.messages, data.events);
        log.scrollTop = log.scrollHeight;
      } catch (err) {
        addMessage("system", String(err), { error: true });
      }
      return true;
    }
    default: {
      addMessage("user", input);
      addMessage("system",
        `Unknown command: ${cmd}. Type /help to see the available commands.`,
        { error: true });
      return true;
    }
  }
}

form.addEventListener("submit", async (event) => {
  event.preventDefault();
  if (sendBtn.disabled) return; // a turn is already in flight
  const prompt = promptEl.value.trim();
  if (!prompt) return;
  if (await handleSlashCommand(prompt)) {
    promptEl.value = "";
    promptEl.focus();
    return;
  }
  addMessage("user", prompt);
  promptEl.value = "";
  setBusy(true);
  thinkingEl = showThinking();

  turnController = new AbortController();
  const timeoutId = setTimeout(
    () => abortTurn(`No response after ${Math.round(CLIENT_TURN_TIMEOUT_MS / 1000)}s — giving up.`),
    CLIENT_TURN_TIMEOUT_MS);
  try {
    const r = await fetch("/api/message", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt, conversation_id: conversationId }),
      signal: turnController.signal,
    });
    const data = await r.json();
    clearThinking();
    conversationId = data.conversation_id ?? conversationId;
    if (data.error) addMessage("system", data.error, { error: true });
    if (data.reply) addMessage("assistant", data.reply);
    const events = data.events || [];
    for (const ev of events) {
      const node = renderEvent(ev);
      if (node) log.appendChild(node);
    }
    if (events.length) log.appendChild(renderTurnCounter(events));
    log.scrollTop = log.scrollHeight;
  } catch (err) {
    clearThinking();
    if (err && err.name === "AbortError") {
      addMessage("system",
        "Request cancelled. The agent may still finish in the background; "
        + "reload to see the latest conversation.", { error: true });
    } else {
      addMessage("system", String(err), { error: true });
    }
  } finally {
    clearTimeout(timeoutId);
    clearThinking();
    turnController = null;
    setBusy(false);
    promptEl.focus();
  }
});

promptEl.addEventListener("keydown", (event) => {
  // Enter sends; Shift+Enter (or Ctrl/Meta+Enter) inserts a newline —
  // the standard chat affordance, so a one-word "Hello" just works.
  if (event.key === "Enter" && !event.shiftKey && !event.ctrlKey && !event.metaKey) {
    event.preventDefault();
    form.requestSubmit();
  }
});
</script>
</body>
</html>
